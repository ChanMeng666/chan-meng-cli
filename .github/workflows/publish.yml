name: Publish to npm

# Triggers on semver tags pushed to the default branch.
# Typical release:
#   npm version patch              # bumps package.json + creates tag vX.Y.Z
#   git push && git push --tags    # GitHub Actions handles the rest
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Guard against the common footgun of tagging vX but leaving
      # package.json at vY. The publish would succeed with the wrong
      # version; this step makes the mismatch a hard failure instead.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing chan-meng@$PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Publishes via OIDC — no NODE_AUTH_TOKEN / no NPM_TOKEN secret
      # needed. The `--provenance` flag attaches a cryptographic
      # attestation linking this tarball to this commit + workflow run,
      # visible on npmjs.com as a verified provenance badge.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
